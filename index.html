<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South East Speed — Archetype Predictor</title>
</head>
<body>

  <div id="ses-quiz-widget">

<div id="screen-quiz">
  <h2>What's your predicted archetype?</h2>
  <p>Rate yourself honestly against elite U18 footballers.</p>

  <label for="height">Height (cm)</label><br>
  <input type="number" id="height" placeholder="178"><br><br>

  <label for="bestjump">Vertical jump — your stronger leg</label><br>
  <select id="bestjump">
    <option value="90">Best in my club/rep squad — could take a hanger over a contest</option>
    <option value="75" selected>Clearly above most of my teammates</option>
    <option value="60">Around the middle of my squad</option>
    <option value="45">Below most of my teammates</option>
    <option value="30">One of the weaker in this area on my team</option>
  </select><br><br>

  <label for="worsejump">Vertical jump — your weaker leg</label><br>
  <select id="worsejump">
    <option value="70">Best in my club/rep squad</option>
    <option value="55" selected>Clearly above most of my teammates</option>
    <option value="40">Around the middle of my squad</option>
    <option value="25">Below most of my teammates</option>
    <option value="10">One of the weaker in this area on my team</option>
  </select><br><br>

  <label for="accel">Initial acceleration (first 5m)</label><br>
  <select id="accel">
    <option value="80">Best in my club/rep squad — first to the footy in a sprint</option>
    <option value="65" selected>Clearly above most of my teammates</option>
    <option value="50">Around the middle of my squad</option>
    <option value="35">Below most of my teammates</option>
    <option value="20">One of the weaker in this area on my team</option>
  </select><br><br>

  <label for="cod">Sharp change of direction</label><br>
  <select id="cod">
    <option value="80">Best in my club/rep squad — defenders rarely stay with me on a lead</option>
    <option value="65" selected>Clearly above most of my teammates</option>
    <option value="50">Around the middle of my squad</option>
    <option value="35">Below most of my teammates</option>
    <option value="20">One of the weaker in this area on my team</option>
  </select><br><br>

  <button id="btn-to-gate">See my predicted archetype</button>
</div>

    <div id="screen-gate" style="display: none;">
      <h2>Screen 2: Contact Details</h2>
      <p>(name/email/phone fields will go here later)</p>
      <button id="btn-to-result">Reveal</button>
    </div>

    <div id="screen-result" style="display: none;">
      <h2>Screen 3: Result</h2>
      <p>(archetype result will go here later)</p>
    </div>

  </div>

  <script>
    document.getElementById("btn-to-gate").addEventListener("click", function() {
      document.getElementById("screen-quiz").style.display = "none";
      document.getElementById("screen-gate").style.display = "block";
    });

    document.getElementById("btn-to-result").addEventListener("click", function() {
      document.getElementById("screen-gate").style.display = "none";
      document.getElementById("screen-result").style.display = "block";
    });
  </script>

</body>
</html>
